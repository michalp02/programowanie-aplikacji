    <pre>var osoba = {
    imie: "Jan",
    nazwisko: "Nowak",
    wiek: 20,
    dzieci: NULL,
    ksywa: undefined,

}
osoba.powiedz("Dzień dobry");</pre>
<button id="test">Przetestuj</button>
<script>
document.getElementById("test").addEventListener("click", testuj);
var osoba = {
    imie: "Jan",
    nazwisko: "Nowak",
    wiek: 20,
    powiedz: function("cos") { alert(cos); }
}
function testuj() {
    osoba.powiedz("Dzień dobry");
}
</script>
</body>

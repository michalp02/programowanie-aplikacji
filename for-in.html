<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Pętle</h1>
    <h2>Deklaracja pętli for...in</h2>
    <pre>
var obiekt = { a: 1, b: 2, c: 3 };

for (const wlasciwosc in obiekt) {
    document.getElementById("wynik").innerHTML += `${wlasciwosc}: ${obiekt[wlasciwosc]}`+"<br>"; 
}</pre>
<button id="test">Przetestuj</button>
<div id="wynik"></div>
<script>
document.getElementById("test").addEventListener("click", testuj);
var obiekt = { a: 1, b: 2, c: 3 };
function testuj() {
    

    for (const wlasciwosc in obiekt) {
        document.getElementById("wynik").innerHTML += `${wlasciwosc}: ${obiekt[wlasciwosc]}`+"<br>"; 
    }
}
</script>
</body>
</html>

<body>
    <h1>Pętla while - wprowadzenie</h1>
    <h2>Deklaracja pętli while</h2>
    <pre>var number = 0;
while(number < 10) {
    alert("Numer: "+number);
    number++;
}</pre>
<button id="test">Przetestuj</button>
<script>
document.getElementById("button").addEventListener("click", testuj);
function testuj() {
    var number = 0;
    while(number < 10) {
        alert("Numer: "+number);
        number++;
    }  
}
</script>
</body>

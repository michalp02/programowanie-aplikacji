<body>
    <h1>Pętle</h1>
    <h2>Deklaracja pętli do...while</h2>
    <pre>var number = 0;
do {
    alert("Numer: "+number);
    number++;
} while(number < 10) </pre>
<button id="test">Przetestuj</button>
<img scr="https://i.redd.it/6wksqjmmyw321.jpg" alt="Mem">
<script>
document.getElementById("test").addEventListener("click", testuj);
function testuj() {
    var number = 0;
    do {
        alert("Numer: "+number);
        number++;
    } while(number < 10); 
}
</script>
